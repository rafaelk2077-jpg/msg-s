  <script>
    (function () {
      try {
        var storageKey = 'vite-ui-theme';
        var themeContext = window.localStorage.getItem(storageKey);
        var theme = themeContext || 'system';

        var isDark =
          theme === 'dark' ||
          (theme === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        // Ignora erros caso o localstorage esteja bloqueado
      }
    })();
  </script>
